name: 'Submodule Update Parents'

on:
  push:
    branches:
      - main    

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  notify:
    name: 'Submodule Notify Parent'
    runs-on: ubuntu-latest

    # Use the Bash shell regardless whether the GitHub Actions runner is ubuntu-latest, macos-latest, or windows-latest
    defaults:
      run:
        shell: bash

    steps:
    - name: Notify documentation-guidelines
      env:
        CI_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PARENT_REPO: rikedyp/documentation-guidelines
        PARENT_BRANCH: trunk
        WORKFLOW_ID: 165027630
      run: |
        curl -fL --retry 3 -X POST -H "Accept: application/vnd.github.v3+json" -H "Authorization: token ${{ env.CI_TOKEN }}" https://api.github.com/repos/${{ env.PARENT_REPO }}/actions/workflows/${{ env.WORKFLOW_ID }}/dispatches -d '{"ref":"${{ env.PARENT_BRANCH }}"}'
    - name: Notify link
      env:
        CI_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PARENT_REPO: rikedyp/link
        PARENT_BRANCH: master
        WORKFLOW_ID: 165028848
      run: |
        curl -fL --retry 3 -X POST -H "Accept: application/vnd.github.v3+json" -H "Authorization: token ${{ env.CI_TOKEN }}" https://api.github.com/repos/${{ env.PARENT_REPO }}/actions/workflows/${{ env.WORKFLOW_ID }}/dispatches -d '{"ref":"${{ env.PARENT_BRANCH }}"}'
